# Workspace variant. Rename to `Cargo.toml` for a multi-crate repo and place
# member crates under `crates/`. Each member inherits via `.workspace = true`
# and carries only its own name + deps:
#
#   [package]
#   name = "{{project-name}}-core"
#   version.workspace = true
#   edition.workspace = true
#   rust-version.workspace = true
#   authors.workspace = true
#   license.workspace = true
#   repository.workspace = true
#
#   [lints]
#   workspace = true
#
#   [dependencies]
#   serde.workspace = true

[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "26.6.0"                       # CalVer YY.M.patch
edition = "2021"
rust-version = "1.82"
authors = ["Sean Chatman <xpointsh@gmail.com>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/seanchatmangpt/{{project-name}}"
homepage = "https://github.com/seanchatmangpt/{{project-name}}"

[workspace.dependencies]
# House shared crate
# chatman-common = "26.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
anyhow = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
blake3 = "1"
linkme = "0.3"
clap = { version = "4", features = ["derive", "env"] }
criterion = "0.5"
proptest = "1"
insta = "1"

[workspace.lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"
unreachable_pub = "warn"
unexpected_cfgs = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
unwrap_used = "warn"
expect_used = "warn"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
