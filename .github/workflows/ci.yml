name: CI

on:
  push:
    branches: ["main", "claude/*"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout affidavit
        uses: actions/checkout@v4
        with:
          path: affidavit

      - name: Clone companion repos
        run: |
          cd ..
          git clone --depth 1 https://github.com/seanchatmangpt/clap-noun-verb.git
          git clone --depth 1 https://github.com/seanchatmangpt/wasm4pm-compat.git
          git clone --depth 1 https://github.com/seanchatmangpt/wasm4pm.git
          git clone --depth 1 https://github.com/seanchatmangpt/chicago-tdd-tools.git
          git clone --depth 1 https://github.com/seanchatmangpt/clnrm.git
          git clone --depth 1 https://github.com/seanchatmangpt/lsp-max.git

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            affidavit/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('affidavit/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        working-directory: affidavit
        run: cargo build --all-targets

      - name: Build with otel feature
        working-directory: affidavit
        run: cargo build --lib --features otel

      - name: Run library tests
        working-directory: affidavit
        run: cargo test --lib

      - name: Run integration tests
        working-directory: affidavit
        run: cargo test --tests

      - name: Run examples (build only)
        working-directory: affidavit
        run: cargo build --examples

  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout affidavit
        uses: actions/checkout@v4
        with:
          path: affidavit

      - name: Clone companion repos
        run: |
          cd ..
          git clone --depth 1 https://github.com/seanchatmangpt/clap-noun-verb.git
          git clone --depth 1 https://github.com/seanchatmangpt/wasm4pm-compat.git
          git clone --depth 1 https://github.com/seanchatmangpt/wasm4pm.git
          git clone --depth 1 https://github.com/seanchatmangpt/chicago-tdd-tools.git
          git clone --depth 1 https://github.com/seanchatmangpt/clnrm.git
          git clone --depth 1 https://github.com/seanchatmangpt/lsp-max.git

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            affidavit/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('affidavit/Cargo.lock') }}

      - name: Check formatting
        working-directory: affidavit
        run: cargo fmt --check

      - name: Run clippy
        working-directory: affidavit
        run: cargo clippy --all-targets -- -D warnings

  benchmarks:
    name: Benchmarks (compile check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout affidavit
        uses: actions/checkout@v4
        with:
          path: affidavit

      - name: Clone companion repos
        run: |
          cd ..
          git clone --depth 1 https://github.com/seanchatmangpt/clap-noun-verb.git
          git clone --depth 1 https://github.com/seanchatmangpt/wasm4pm-compat.git
          git clone --depth 1 https://github.com/seanchatmangpt/wasm4pm.git
          git clone --depth 1 https://github.com/seanchatmangpt/chicago-tdd-tools.git
          git clone --depth 1 https://github.com/seanchatmangpt/clnrm.git
          git clone --depth 1 https://github.com/seanchatmangpt/lsp-max.git

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            affidavit/target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('affidavit/Cargo.lock') }}

      - name: Compile benchmarks
        working-directory: affidavit
        run: cargo build --benches
