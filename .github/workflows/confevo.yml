# confevo.yml — Python gate for the confevo tool.
#
# tools/confevo/ is a stdlib-only (no pip dependencies) genetic Cargo-feature
# optimizer. Its unit tests and a dry-run smoke test both pass cleanly, so they
# gate here (no continue-on-error). Like the other workflows, this runs only
# when its own area changes.
name: confevo

on:
  push:
    paths:
      - "tools/confevo/**"
      - ".github/workflows/confevo.yml"
  pull_request:
    paths:
      - "tools/confevo/**"
      - ".github/workflows/confevo.yml"

concurrency:
  group: confevo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  confevo:
    name: confevo (unittest + dry-run)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Unit tests (stdlib unittest)
        run: python3 -m unittest discover -s tools/confevo -t . -p 'test_*.py'

      - name: Dry-run smoke test
        run: python3 tools/confevo/confevo.py run --dry-run
