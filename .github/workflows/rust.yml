# rust.yml — checks for the root `affidavit` crate.
#
# The root crate cannot be built in CI: it depends on wasm4pm-compat 26.6.13
# (crates.io), which does NOT compile under current Rust nightly (~550 upstream
# E0432 errors). That is an upstream breakage, not a defect in this repo's
# source, and "fixing" it is out of scope. See AGENTS.md.
#
# This repo's ethos: a green that is true whether or not the work happened
# carries no information. So the jobs below are deliberately split by honesty:
#
#   * `fmt` is the REAL, BLOCKING gate. rustfmt only parses source — it never
#     resolves the dependency graph — so it passes/fails purely on the merits of
#     the committed code. (It previously carried `continue-on-error: true`, which
#     silently neutered the one gate that means something here. That is removed.)
#   * `build-and-test` attempts a real build for diagnostic signal but stays
#     `continue-on-error: true`: its (fully expected) failure must never gate.
#
# The standalone `affidavit-core/` crate DOES build and test cleanly — its real
# gate lives in affidavit-core.yml, not here. `cargo fmt --all` from the root
# only covers the root crate (affidavit-core is not a workspace member).
name: rust

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/rust.yml"

concurrency:
  group: rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # REAL GATE: formatting needs no dependencies, so this genuinely passes/fails
  # on the merits of the committed source. No continue-on-error — it blocks.
  # ---------------------------------------------------------------------------
  fmt:
    name: rustfmt (cargo fmt --check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly Rust with rustfmt
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: cargo fmt --all --check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # NON-BLOCKING (continue-on-error): wasm4pm-compat 26.6.13 from crates.io does
  # not compile under current nightly (~550 upstream errors). Kept for signal /
  # diagnostics only; it is EXPECTED to fail and must never gate a merge. Clippy
  # lives here too because it likewise needs a clean build graph.
  # ---------------------------------------------------------------------------
  build-and-test:
    name: build-and-test (non-blocking, broken upstream dep)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly toolchain with clippy
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Explain why this job is expected to fail
        run: |
          echo "::warning title=Non-blocking by design::wasm4pm-compat 26.6.13 from crates.io does not compile under current nightly."
          echo "------------------------------------------------------------------"
          echo "All of affidavit's dependencies resolve fine from crates.io — there"
          echo "is no missing sibling-workspace issue. The build fails because"
          echo "wasm4pm-compat 26.6.13 (the version on crates.io) itself does not"
          echo "compile under current Rust nightly: ~550 E0432 errors (unresolved"
          echo "imports of internal types) inside the upstream crate. This is an"
          echo "upstream breakage, not a problem with affidavit's own source."
          echo ""
          echo "The steps below run for signal only; the whole job is"
          echo "continue-on-error: true. Formatting (the fmt job) is the real gate."
          echo "------------------------------------------------------------------"

      - name: cargo build (expected to fail, broken upstream wasm4pm-compat)
        run: cargo build --all-targets

      - name: cargo test (expected to fail, broken upstream wasm4pm-compat)
        run: cargo test --all-targets

      - name: cargo clippy (expected to fail, broken upstream wasm4pm-compat)
        run: cargo clippy --all-targets -- -D warnings
