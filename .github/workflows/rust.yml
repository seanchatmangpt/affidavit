# rust.yml — checks for the root `affidavit` crate.
#
# The root crate builds again: the previously-broken upstream crates (wasm4pm,
# wasm4pm-compat, clnrm-core) are replaced by local stubs via [patch.crates-io]
# in Cargo.toml (see stubs/). Build + test are therefore real gates now. See
# AGENTS.md.
#
# This repo's ethos: a green that is true whether or not the work happened
# carries no information. The jobs below are split by honesty:
#
#   * `fmt` — REAL, BLOCKING gate. rustfmt only parses source, so it passes/fails
#     purely on the merits of the committed code.
#   * `build-and-test` — REAL, BLOCKING gate now that the stubs make the crate
#     compile: `cargo build` / `cargo test` (incl. doctests) over all targets.
#   * `clippy` — REAL, BLOCKING gate. The print_stdout debt is paid down (library
#     output routes through `output.rs` via the `outln!` macro), so
#     `cargo clippy --all-targets -- -D warnings` is clean.
#
# The standalone `affidavit-core/` crate has its own gate in affidavit-core.yml.
# `cargo fmt --all` from the root only covers the root crate (affidavit-core is
# not a workspace member).
name: rust

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/rust.yml"

concurrency:
  group: rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # REAL GATE: formatting needs no dependencies, so this genuinely passes/fails
  # on the merits of the committed source. No continue-on-error — it blocks.
  # ---------------------------------------------------------------------------
  fmt:
    name: rustfmt (cargo fmt --check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly Rust with rustfmt
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: cargo fmt --all --check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # REAL GATE: the root crate now builds (upstream crates replaced by local
  # stubs via [patch.crates-io] — see Cargo.toml / stubs/). So build + test pass
  # and this job BLOCKS. Doctests run separately because --all-targets skips them.
  # ---------------------------------------------------------------------------
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: cargo build --all-targets
        run: cargo build --all-targets

      - name: cargo test --all-targets (unit + integration + example/bench harnesses)
        run: cargo test --all-targets

      - name: cargo test --doc (doctests)
        run: cargo test --doc

  # ---------------------------------------------------------------------------
  # REAL GATE: the print_stdout debt is paid down — library output routes through
  # the sanctioned sinks in output.rs (via the `outln!` macro) and the style lints
  # are fixed, so `cargo clippy --all-targets -- -D warnings` is clean and BLOCKS.
  # ---------------------------------------------------------------------------
  clippy:
    name: clippy (cargo clippy --all-targets -D warnings)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly toolchain with clippy
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets -- -D warnings
